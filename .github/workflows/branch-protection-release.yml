on:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: '3.13'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Setup | Checkout Repository at workflow sha
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup | Force correct release branch on workflow sha
        run: |
          git checkout -B ${{ github.ref_name }}

      - name: Setup | Install Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Evaluate | Determine Next Version then Stamp & Build
        id: version
        uses: python-semantic-release/python-semantic-release@v9.16.1
        with:
          github_token: ""    # value not actually needed for this limited operation
          root_options: "-v"
          commit: false
          tag: true           # required, due to release notes generation tag check
          push: false
          vcs_release: false
          changelog: false    # I don't know if you wanted this or not

      - name: Release | Generate Release Notes
        # step likely not be needed with the resolution of #512
        # as it is dependent on the log output of PSR which could change
        if: steps.version.outputs.released == 'true'
        id: release-notes
        run: |
          pip install python-semantic-release==9.16.1
          semantic-release --noop changelog --post-to-release-notes ${{ steps.version.outputs.tag }} 2>release-notes.log
          tac release-notes.log | awk '/posted the following release notes/ {exit} {print}' | tac | tee release-notes.md
          printf '%s\n' "NOTES_FILE=release-notes.md" >> $GITHUB_OUTPUT

      - name: Release | Tag & Publish GitHub Release Notes
        if: steps.version.outputs.released == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file "${{ steps.release-notes.outputs.NOTES_FILE }}" \
            --target ${{ github.sha }} \
            --repo ${{ github.repository }}
